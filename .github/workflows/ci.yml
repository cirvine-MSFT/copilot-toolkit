name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Syntax check extension files
        run: |
          echo "Checking extension JavaScript syntax..."
          errors=0
          while IFS= read -r f; do
            if ! node --check "$f" 2>&1; then
              echo "::error file=$f::Syntax error in $f"
              errors=$((errors + 1))
            fi
          done < <(find extensions -type f \( -name '*.mjs' -o -name '*.js' \))
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors file(s) had syntax errors"
            exit 1
          fi
          echo "All files passed syntax check"

      - name: Validate plugin.json
        run: |
          node -e "
            const fs = require('fs');
            const plugin = JSON.parse(fs.readFileSync('plugin.json', 'utf8'));
            const required = ['name', 'version', 'description', 'license'];
            const missing = required.filter(k => !plugin[k]);
            if (missing.length) {
              console.error('plugin.json missing required fields:', missing.join(', '));
              process.exit(1);
            }
            console.log('plugin.json is valid:', plugin.name, plugin.version);
          "

  test-install-bash:
    name: Install (bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run install and verify
        run: |
          export COPILOT_HOME="$(mktemp -d)/copilot"
          ./install-extensions.sh

          echo "Checking installed files..."
          test -f "$COPILOT_HOME/extensions/ado-pr-watcher/extension.mjs" || { echo "::error::ado-pr-watcher/extension.mjs missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/ado-pr-watcher/common.mjs" || { echo "::error::ado-pr-watcher/common.mjs missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/ado-pr-watcher/integration.mjs" || { echo "::error::ado-pr-watcher/integration.mjs missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/ado-pr-watcher/worker.mjs" || { echo "::error::ado-pr-watcher/worker.mjs missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/ado-build-watcher/extension.mjs" || { echo "::error::ado-build-watcher/extension.mjs missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/ado-build-watcher/common.mjs" || { echo "::error::ado-build-watcher/common.mjs missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/ado-build-watcher/watcher-worker.mjs" || { echo "::error::ado-build-watcher/watcher-worker.mjs missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/visual-review/extension.mjs" || { echo "::error::visual-review/extension.mjs missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/visual-review/common.mjs" || { echo "::error::visual-review/common.mjs missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/visual-review/main.mjs" || { echo "::error::visual-review/main.mjs missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/visual-review/comment-store.mjs" || { echo "::error::visual-review/comment-store.mjs missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/visual-review/package.json" || { echo "::error::visual-review/package.json missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/visual-review/lib/copilot-webview.js" || { echo "::error::visual-review/lib/copilot-webview.js missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/visual-review/lib/webview-child.mjs" || { echo "::error::visual-review/lib/webview-child.mjs missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/visual-review/content/index.html" || { echo "::error::visual-review/content/index.html missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/visual-review/content/app.js" || { echo "::error::visual-review/content/app.js missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/visual-review/content/styles.css" || { echo "::error::visual-review/content/styles.css missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/visual-review/content/diff-view.js" || { echo "::error::visual-review/content/diff-view.js missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/visual-review/content/viz-panel.js" || { echo "::error::visual-review/content/viz-panel.js missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/visual-review/content/vendor/diff2html-ui.min.js" || { echo "::error::visual-review/content/vendor/diff2html-ui.min.js missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/visual-review/content/vendor/diff2html.min.css" || { echo "::error::visual-review/content/vendor/diff2html.min.css missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/lib/tab-indicator.mjs" || { echo "::error::lib/tab-indicator.mjs missing"; exit 1; }
          test -f "$COPILOT_HOME/extensions/lib/resolve-node.mjs" || { echo "::error::lib/resolve-node.mjs missing"; exit 1; }
          echo "All expected files present"

      - name: Verify idempotence (stale files removed)
        run: |
          export COPILOT_HOME="$(mktemp -d)/copilot"
          ./install-extensions.sh

          touch "$COPILOT_HOME/extensions/ado-pr-watcher/old-stale-file.mjs"
          ./install-extensions.sh

          if [ -f "$COPILOT_HOME/extensions/ado-pr-watcher/old-stale-file.mjs" ]; then
            echo "::error::Stale file survived reinstall — installer is not idempotent"
            exit 1
          fi
          echo "Idempotence verified — stale files removed on reinstall"

  test-install-pwsh:
    name: Install (pwsh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run install and verify
        shell: pwsh
        run: |
          $copilotHome = (New-Item -ItemType Directory -Path (Join-Path ([System.IO.Path]::GetTempPath()) "copilot-test-$(Get-Random)")).FullName
          $env:COPILOT_HOME = $copilotHome
          ./install-extensions.ps1

          $expected = @(
            "ado-pr-watcher/extension.mjs",
            "ado-pr-watcher/common.mjs",
            "ado-pr-watcher/integration.mjs",
            "ado-pr-watcher/worker.mjs",
            "ado-build-watcher/extension.mjs",
            "ado-build-watcher/common.mjs",
            "ado-build-watcher/watcher-worker.mjs",
            "visual-review/extension.mjs",
            "visual-review/common.mjs",
            "visual-review/main.mjs",
            "visual-review/comment-store.mjs",
            "visual-review/package.json",
            "visual-review/lib/copilot-webview.js",
            "visual-review/lib/webview-child.mjs",
            "visual-review/content/index.html",
            "visual-review/content/app.js",
            "visual-review/content/styles.css",
            "visual-review/content/diff-view.js",
            "visual-review/content/viz-panel.js",
            "visual-review/content/vendor/diff2html-ui.min.js",
            "visual-review/content/vendor/diff2html.min.css",
            "lib/tab-indicator.mjs",
            "lib/resolve-node.mjs"
          )
          $extDir = Join-Path $copilotHome "extensions"
          $missing = $expected | Where-Object { -not (Test-Path (Join-Path $extDir $_)) }
          if ($missing) {
            $missing | ForEach-Object { Write-Error "Missing: $_" }
            exit 1
          }
          Write-Host "All expected files present"

      - name: Verify idempotence (stale files removed)
        shell: pwsh
        run: |
          $copilotHome = (New-Item -ItemType Directory -Path (Join-Path ([System.IO.Path]::GetTempPath()) "copilot-test-$(Get-Random)")).FullName
          $env:COPILOT_HOME = $copilotHome
          ./install-extensions.ps1

          $prDir = Join-Path (Join-Path $copilotHome "extensions") "ado-pr-watcher"
          $stale = Join-Path $prDir "old-stale-file.mjs"
          "" | Set-Content $stale

          ./install-extensions.ps1

          if (Test-Path $stale) {
            Write-Error "Stale file survived reinstall — installer is not idempotent"
            exit 1
          }
          Write-Host "Idempotence verified — stale files removed on reinstall"

  test-install-windows:
    name: Install (Windows PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run install and verify
        shell: powershell
        run: |
          $copilotHome = New-Item -ItemType Directory -Path (Join-Path $env:TEMP "copilot-test-$(Get-Random)")
          $env:COPILOT_HOME = $copilotHome.FullName
          .\install-extensions.ps1

          $expected = @(
            "ado-pr-watcher\extension.mjs",
            "ado-pr-watcher\common.mjs",
            "ado-pr-watcher\integration.mjs",
            "ado-pr-watcher\worker.mjs",
            "ado-build-watcher\extension.mjs",
            "ado-build-watcher\common.mjs",
            "ado-build-watcher\watcher-worker.mjs",
            "visual-review\extension.mjs",
            "visual-review\common.mjs",
            "visual-review\main.mjs",
            "visual-review\comment-store.mjs",
            "visual-review\package.json",
            "visual-review\lib\copilot-webview.js",
            "visual-review\lib\webview-child.mjs",
            "visual-review\content\index.html",
            "visual-review\content\app.js",
            "visual-review\content\styles.css",
            "visual-review\content\diff-view.js",
            "visual-review\content\viz-panel.js",
            "visual-review\content\vendor\diff2html-ui.min.js",
            "visual-review\content\vendor\diff2html.min.css",
            "lib\tab-indicator.mjs",
            "lib\resolve-node.mjs"
          )
          $extDir = Join-Path $copilotHome.FullName "extensions"
          $missing = $expected | Where-Object { -not (Test-Path (Join-Path $extDir $_)) }
          if ($missing) {
            $missing | ForEach-Object { Write-Error "Missing: $_" }
            exit 1
          }
          Write-Host "All expected files present on Windows"
