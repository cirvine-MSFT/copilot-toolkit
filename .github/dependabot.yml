version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  - package-ecosystem: "npm"
    directory: "/extensions/excalidraw-workbench/webview"
    schedule:
      interval: "weekly"
    groups:
      webview-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
