name: Question or support
description: Ask for help using or configuring the toolkit
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Please do not include secrets, tokens, private URLs, or other sensitive data. If you need to report a security vulnerability, use private vulnerability reporting instead of a public issue.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - ado-pr-watcher
        - ado-build-watcher
        - excalidraw-workbench
        - install scripts
        - documentation
        - other
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do, and where are you stuck?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, shell, Copilot CLI version, Node.js version, or Azure CLI version if relevant.
