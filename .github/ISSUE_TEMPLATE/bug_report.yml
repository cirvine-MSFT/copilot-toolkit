name: Bug report
description: Report something that is not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Please do not include secrets, tokens, private URLs, or other sensitive data.
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - ado-pr-watcher
        - ado-build-watcher
        - excalidraw-workbench
        - install scripts
        - documentation
        - other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you were trying to do.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Install ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, shell, Copilot CLI version, Node.js version, or Azure CLI version if relevant.
      placeholder: "Windows 11, PowerShell 7.4, Copilot CLI ..., Node.js 20.x"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or screenshots. Redact secrets, tokens, private URLs, and personal paths.
      render: text
