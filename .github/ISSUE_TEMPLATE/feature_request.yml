name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please keep examples generic and avoid private repository, organization, or credential details.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - ado-pr-watcher
        - ado-build-watcher
        - excalidraw-workbench
        - install scripts
        - documentation
        - new extension, skill, or agent
        - other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow, limitation, or pain point would this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional context about workarounds or other designs you considered.
