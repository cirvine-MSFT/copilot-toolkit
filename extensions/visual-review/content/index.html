<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Review — Copilot CLI</title>
    <link rel="stylesheet" href="styles.css">
    <!-- diff2html CSS (bundled locally to avoid CDN tracking prevention issues) -->
    <link rel="stylesheet" href="vendor/diff2html.min.css">
    <script src="/__bridge.js"></script>
</head>
<body>
    <header class="vr-header">
        <div class="vr-header-left">
            <h1>Visual Review</h1>
            <span class="vr-connection-status" id="connectionStatus">
                <span class="vr-status-dot"></span>
                <span class="vr-status-text">Connecting…</span>
            </span>
        </div>
        <nav class="vr-tabs">
            <button class="vr-tab active" data-panel="diff">
                <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                    <path d="M8.75 1.75V5H12a.75.75 0 0 1 0 1.5H8.75v3.25a.75.75 0 0 1-1.5
                             0V6.5H4A.75.75 0 0 1 4 5h3.25V1.75a.75.75 0 0 1 1.5 0Z"/>
                    <path d="M13.25 0a.75.75 0 0 1 .75.75v1.5h1.5a.75.75 0 0 1 0
                             1.5h-1.5v1.5a.75.75 0 0 1-1.5 0v-1.5h-1.5a.75.75 0 0 1
                             0-1.5h1.5V.75a.75.75 0 0 1 .75-.75Z" opacity="0"/>
                </svg>
                Files changed
            </button>
            <button class="vr-tab" data-panel="viz">
                <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                    <path d="M1.5 1.75V13.5h13.75a.75.75 0 0 1 0 1.5H.75a.75.75 0 0
                             1-.75-.75V1.75a.75.75 0 0 1 1.5 0Zm14.28 2.53-5.25 5.25a.75.75
                             0 0 1-1.06 0L7 7.06 4.28 9.78a.751.751 0 0 1-1.042-.018.751.751
                             0 0 1-.018-1.042l3.25-3.25a.75.75 0 0 1 1.06 0L10 7.94l4.72-4.72a.751.751
                             0 0 1 1.042.018.751.751 0 0 1 .018 1.042Z"/>
                </svg>
                Visualizations
            </button>
        </nav>
        <div class="vr-header-right">
            <span class="vr-pending-badge" id="pendingBadge"></span>
            <button class="vr-btn vr-btn-primary vr-btn-submit-all hidden" id="submitAllBtn" title="Send all pending comments">
                Submit review
            </button>
            <!-- Comment navigation -->
            <div class="vr-comment-nav hidden" id="commentNav">
                <button class="vr-btn vr-btn-outline vr-btn-nav" id="prevComment" title="Previous comment (Shift+F7)">
                    <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                        <path d="M3.22 9.78a.749.749 0 0 1 0-1.06l4.25-4.25a.749.749 0 0 1 1.06 0l4.25 4.25a.749.749 0 1 1-1.06 1.06L8 6.06 4.28 9.78a.749.749 0 0 1-1.06 0Z"/>
                    </svg>
                </button>
                <span class="vr-comment-nav-label" id="commentNavLabel">0/0</span>
                <button class="vr-btn vr-btn-outline vr-btn-nav" id="nextComment" title="Next comment (F7)">
                    <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                        <path d="M12.78 6.22a.749.749 0 0 1 0 1.06l-4.25 4.25a.749.749 0 0 1-1.06 0L3.22 7.28a.749.749 0 1 1 1.06-1.06L8 9.94l3.72-3.72a.749.749 0 0 1 1.06 0Z"/>
                    </svg>
                </button>
            </div>
            <span class="vr-file-count" id="fileCount"></span>
            <select class="vr-scope-select" id="scopeSelect" title="Diff scope">
                <option value="branch">Branch diff</option>
                <option value="staged">Staged changes</option>
                <option value="unstaged">Unstaged changes</option>
            </select>
            <button class="vr-btn vr-btn-outline" id="viewToggle" title="Toggle split/unified view">
                <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                    <path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16
                             1.75v12.5A1.75 1.75 0 0 1 14.25 16H1.75A1.75 1.75 0 0 1
                             0 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0
                             .138.112.25.25.25H7.5V1.5Zm6.25 13h6.25a.25.25 0 0 0
                             .25-.25V1.75a.25.25 0 0 0-.25-.25H8v13Z"/>
                </svg>
                <span id="viewToggleLabel">Split</span>
            </button>
            <button class="vr-btn vr-btn-outline" id="sidebarToggle" title="Toggle file sidebar">
                <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                    <path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16
                             1.75v12.5A1.75 1.75 0 0 1 14.25 16H1.75A1.75 1.75 0 0
                             1 0 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0
                             .138.112.25.25.25h3.5V1.5Zm5 0v13h7.5a.25.25 0 0 0
                             .25-.25V1.75a.25.25 0 0 0-.25-.25Z"/>
                </svg>
            </button>
            <button class="vr-btn vr-btn-outline" id="reloadBtn" title="Reload page (F5)">
                <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                    <path d="M1.705 8.005a.75.75 0 0 1 .834.656 5.5 5.5 0 0 0 9.592
                             2.97l-1.204-1.204a.25.25 0 0 1 .177-.427h3.646a.25.25 0 0
                             1 .25.25v3.646a.25.25 0 0 1-.427.177l-1.38-1.38A7.002 7.002
                             0 0 1 1.05 8.84a.75.75 0 0 1 .656-.834ZM8 2.5a5.487 5.487
                             0 0 0-4.131 1.869l1.204 1.204A.25.25 0 0 1 4.896 6H1.25A.25.25
                             0 0 1 1 5.75V2.104a.25.25 0 0 1 .427-.177l1.38 1.38A7.002
                             7.002 0 0 1 14.95 7.16a.75.75 0 0 1-1.49.178A5.5 5.5 0 0 0 8 2.5Z"/>
                </svg>
            </button>
        </div>
    </header>

    <main class="vr-main">
        <!-- File list sidebar -->
        <aside class="vr-sidebar" id="sidebar">
            <div class="vr-sidebar-header">
                <div class="vr-sidebar-header-row">
                    <input type="text" class="vr-filter-input" id="fileFilter"
                           placeholder="Filter changed files" autocomplete="off" spellcheck="false">
                    <button class="vr-btn vr-btn-icon" id="treeToggle" title="Switch to tree view">
                        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" id="treeToggleIcon">
                            <path d="M1.75 1a.75.75 0 0 0-.75.75v3c0 .414.336.75.75.75h3.5a.75.75 0 0 0 .75-.75v-3A.75.75 0 0 0 5.25 1Zm9 0a.75.75 0 0 0-.75.75v3c0 .414.336.75.75.75h3.5a.75.75 0 0 0 .75-.75v-3a.75.75 0 0 0-.75-.75ZM1.75 9a.75.75 0 0 0-.75.75v3c0 .414.336.75.75.75h3.5a.75.75 0 0 0 .75-.75v-3A.75.75 0 0 0 5.25 9Zm5.75 1.75a.75.75 0 0 1 .75-.75h1.5v-1.5a.75.75 0 0 1 1.5 0V10h1.5a.75.75 0 0 1 0 1.5h-1.5v1.5a.75.75 0 0 1-1.5 0v-1.5H8.25a.75.75 0 0 1-.75-.75Z"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="vr-file-tree" id="fileTree"></div>
        </aside>

        <!-- Diff panel -->
        <section class="vr-panel" id="diffPanel">
            <div class="vr-empty-state" id="diffEmpty">
                <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor" opacity="0.3">
                    <path d="M12 1C5.925 1 1 5.925 1 12s4.925 11 11 11 11-4.925 11-11S18.075
                             1 12 1ZM2.5 12a9.5 9.5 0 0 1 9.5-9.5 9.5 9.5 0 0 1 9.5 9.5 9.5
                             9.5 0 0 1-9.5 9.5A9.5 9.5 0 0 1 2.5 12Z"/>
                    <path d="M12 7a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5A.75.75
                             0 0 1 12 7Zm0 10a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"/>
                </svg>
                <p>Waiting for diff data…</p>
                <span class="vr-empty-hint">Loading diff data…</span>
            </div>
            <div id="diffContainer"></div>
        </section>

        <!-- Visualization panel -->
        <section class="vr-panel hidden" id="vizPanel">
            <div class="vr-empty-state" id="vizEmpty">
                <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor" opacity="0.3">
                    <path d="M2.5 2.75a.75.75 0 0 0-1.5 0v18.5c0 .414.336.75.75.75H20a.75.75
                             0 0 0 0-1.5H2.5Z"/>
                    <path d="M22.28 7.78a.751.751 0 0 0-1.042-.018.751.751 0 0
                             0-.018-1.042l-5.25 5.25a.75.75 0 0 1-1.06 0L12.46
                             9.52a2.25 2.25 0 0 0-3.18 0L5.03 13.78a.751.751 0 0 0
                             .018 1.042.751.751 0 0 0 1.042.018l4.25-4.26a.75.75 0 0
                             1 1.06 0l2.45 2.45a2.25 2.25 0 0 0 3.18 0Z"/>
                </svg>
                <p>No visualizations yet</p>
                <span class="vr-empty-hint">Mermaid diagrams will appear here when generated.</span>
            </div>
            <div id="vizContainer"></div>
        </section>
    </main>

    <!-- diff2html JS (bundled locally) -->
    <script src="vendor/diff2html-ui.min.js"></script>
    <!-- Mermaid from CDN (optional — visualizations degrade gracefully if blocked) -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
        window.mermaid = mermaid;
        mermaid.initialize({ startOnLoad: false, theme: 'dark' });
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
